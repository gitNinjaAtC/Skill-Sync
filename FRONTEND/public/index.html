<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
    />
    <meta name="description" content="SISTec Alumni Portal – Connect, collaborate, and grow with the SISTec Alumni Network" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#5271ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SISTEC Alumni" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SISTEC Alumni" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/SISTec_Logo.png" />
    <link rel="apple-touch-icon" href="/SISTec_Logo.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Open Sans", sans-serif;
        margin: 0;
        padding: 0;
      }

      /* Instant splash background — shown before React JS even loads */
      html, body {
        background: #0a0e2e;
        height: 100%;
        overflow: hidden;
      }

      #root {
        height: 100%;
      }

      /* Native-feel loading fallback shown before bundle parses */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a0e2e 0%, #0d1b4b 40%, #112266 100%);
        z-index: 99998;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      body.app-ready::before {
        opacity: 0;
      }
    </style>
    <title>SISTec Alumni Portal</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
